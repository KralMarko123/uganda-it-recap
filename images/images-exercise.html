<html>
  <head>
    <title>Image Exercise</title>

    <style>
      body {
        font-family: Arial;
        background-color: gainsboro;
        padding: 10px;
      }

      div {
        background-color: white;
        padding: 20px;
        margin-bottom: 30px;
        border-radius: 15px;
      }

      h1 {
        color: darkblue;
      }

      h2 {
        color: darkgreen;
      }

      img {
        border-radius: 10px;
      }

      .circle {
        border-radius: 50%;
      }

      .spaced-out {
        margin: 15px;
      }

      .right {
        text-align: right;
      }
    </style>
  </head>

  <body>
    <div>
      <h1>My Images</h1>
      <p>Below are some images from the internet.</p>
    </div>

    <div>
      <h2>A Cat</h2>

      <img
        style="border: 5px solid green"
        src="https://images.pexels.com/photos/416160/pexels-photo-416160.jpeg"
        alt="A cute cat"
        width="300"
        height="200"
      />
    </div>

    <div class="right">
      <h2>A Dog</h2>

      <img
        style="border: 5px solid green"
        src="https://images.pexels.com/photos/59523/pexels-photo-59523.jpeg"
        alt="A dog"
        width="300"
        height="200"
      />
    </div>

    <div style="text-align: center">
      <h2>Two Images Together</h2>

      <img
        class="circle spaced-out"
        src="https://images.pexels.com/photos/746684/pexels-photo-746684.jpeg"
        alt="Random image"
        width="300"
        height="300"
      />

      <img
        class="circle spaced-out"
        src="https://images.pexels.com/photos/3487734/pexels-photo-3487734.jpeg"
        alt="Another random image"
        width="300"
        height="300"
      />
    </div>
  </body>
</html>
